name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npx tsc --noEmit -p tsconfig.json   # the build transpiles only; this is the type gate
      - run: npm test
      - run: npm run build                       # catches webpack/loader breakage, not types
