name: Publish to npm

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # trusted publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24   # ships npm 11.8; trusted publishing needs npm >= 11.5.1
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npx tsc --noEmit -p tsconfig.json
      - run: npm test
      - run: npm run build   # .npmrc ignore-scripts=true kills prepublishOnly, so build here
      - run: npm publish --provenance
